[pytest]
# Pytest configuration for SlideShow Builder

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts = 
    --verbose
    --tb=short
    --color=yes
    
# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests requiring multiple components
    security: Security-related tests (path traversal, input validation, etc.)
    slow: Slow tests that take more than 1 second
    gui: Tests requiring GUI components (may be skipped in CI)
    
# Test timeout (useful for catching infinite loops)
timeout = 30

# Coverage settings (if pytest-cov is installed)
# addopts = --cov=slideshow --cov-report=html --cov-report=term-missing

# Minimum Python version
minversion = 3.8